name: Cache VWorld Data

on:
  schedule:
    # 매일 새벽 3시 (KST) = UTC 18:00 전날
    - cron: '0 18 * * *'
  workflow_dispatch: # 수동 실행도 가능

jobs:
  cache:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache VWorld zoning data to Supabase
        env:
          VWORLD_API_KEY_getLandUse: ${{ secrets.VWORLD_API_KEY_getLandUse }}
          VWORLD_DATA_DOMAIN: ${{ secrets.VWORLD_DATA_DOMAIN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/cache-vworld.js
