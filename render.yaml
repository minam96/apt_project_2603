services:
  - type: web
    name: apt-api
    runtime: node
    buildCommand: npm install && npm run build:apt-coords-live -- --concurrency 3
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATA_GO_KR_API_KEY
        sync: false
      - key: MOLIT_API_KEY
        sync: false
      - key: VWORLD_API_KEY
        sync: false
      - key: VWORLD_DATA_API_KEY
        sync: false
      - key: VWORLD_API_KEY_getLandUse
        sync: false
      - key: VWORLD_DATA_DOMAIN
        sync: false
      - key: VWORLD_PROXY_BASE
        sync: false
      - key: KAKAO_REST_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: CACHE_BUILD_ENABLED
        sync: false
      - key: CACHE_TOKEN
        sync: false
      - key: DATA_SEOUL_realestate
        sync: false
      - key: DATA_SEOUL_getLandUse
        sync: false
      - key: LAW_API_OC
        sync: false
    healthCheckPath: /api/config
